<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Stop Display - Smart Bus System</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/cards.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <style>
        /* Custom styles for public bus stop display */
        body {
            background: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .busstop-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .busstop-header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .busstop-header .stop-name {
            font-size: 1.5rem;
            margin-top: 10px;
            opacity: 0.9;
        }

        .busstop-header .timestamp {
            font-size: 1rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        .busstop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .stat-label {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .bus-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .bus-card {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            border-left: 5px solid #667eea;
        }

        .bus-card:hover {
            transform: translateY(-5px);
        }

        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .bus-id {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .bus-route {
            font-size: 1rem;
            opacity: 0.8;
        }

        .capacity-info {
            margin: 15px 0;
        }

        .capacity-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 5px;
        }

        .capacity-label {
            opacity: 0.8;
        }

        .capacity-value {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .status-seats-available {
            background: #10b981;
            color: white;
        }

        .status-standing-only {
            background: #f59e0b;
            color: white;
        }

        .status-bus-full {
            background: #ef4444;
            color: white;
        }

        .no-buses {
            text-align: center;
            padding: 60px;
            background: #16213e;
            border-radius: 15px;
        }

        .no-buses h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        /* Auto-refresh indicator */
        .refresh-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header class="busstop-header">
        <h1>🚏 Smart Bus Stop Display</h1>
        <div class="stop-name" id="stopName">Loading...</div>
        <div class="timestamp" id="currentTime">Loading...</div>
    </header>

    <!-- Main Container -->
    <div class="busstop-container">
        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="busesEntering">0</div>
                <div class="stat-label">Buses Entering</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="busesAtStop">0</div>
                <div class="stat-label">Buses at Stop</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="busesLeaving">0</div>
                <div class="stat-label">Buses Leaving</div>
            </div>
        </div>

        <!-- Buses List -->
        <div class="bus-list" id="busList">
            <!-- Bus cards will be populated here by JavaScript -->
        </div>

        <!-- No Buses Message -->
        <div class="no-buses" id="noBusesMessage" style="display: none;">
            <h2>No buses currently at this stop</h2>
            <p>Please wait for the next arrival</p>
        </div>
    </div>

    <!-- Auto-refresh Indicator -->
    <div class="refresh-indicator pulse">
        <span id="refreshTimer">Auto-refresh in 5s</span>
    </div>

    <!-- Scripts -->
    <script src="../scripts/api.js"></script>
    <script src="../scripts/busstop.js"></script>
    <script src="../scripts/websocket.js"></script>
    <script src="../components/busCard.js"></script>

    <script>
        // Initialize bus stop display
        document.addEventListener('DOMContentLoaded', function() {
            // Get stop name from URL parameter or use default
            const urlParams = new URLSearchParams(window.location.search);
            const stopName = urlParams.get('stop') || 'Central Bus Station';
            document.getElementById('stopName').textContent = stopName;

            // Update current time
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);

            // Load bus data
            loadBusStopData(stopName);

            // Auto-refresh every 5 seconds
            let countdown = 5;
            setInterval(() => {
                countdown--;
                document.getElementById('refreshTimer').textContent = `Auto-refresh in ${countdown}s`;
                
                if (countdown === 0) {
                    loadBusStopData(stopName);
                    countdown = 5;
                }
            }, 1000);
        });

        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            const dateString = now.toLocaleDateString('en-IN', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('currentTime').textContent = `${dateString} | ${timeString}`;
        }

        function loadBusStopData(stopName) {
            // This function is fully implemented in busstop.js
            // Here we just call it if it exists
            if (typeof initializeBusStopDisplay === 'function') {
                initializeBusStopDisplay(stopName);
            }
        }
    </script>
</body>
</html>
